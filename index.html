<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoEdu — Car Electronics Learning Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0f14;--bg2:#141720;--bg3:#1a1e2b;--surface:#1f2433;--surface2:#252a3a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf2;--text2:#8b90a8;--text3:#555a6e;
  --accent:#f5a623;--accent2:#e8891a;--blue:#4f8ef7;--blue2:#3a6fd8;
  --green:#2ecc8a;--green2:#239c6a;--red:#e05454;--purple:#9b6dff;
  --r:10px;--r2:6px;
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--glow:0 0 30px rgba(245,166,35,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:var(--font-display);letter-spacing:-0.02em}
button{cursor:pointer;font-family:var(--font-body)}
input,textarea,select{font-family:var(--font-body)}
.hidden{display:none!important}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

/* ── PAGES ── */
.page{display:none}
.page.active{display:block}

/* ── LOADING SCREEN ── */
#loading-screen{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;
  transition:opacity 0.3s;
}
#loading-screen.hide{opacity:0;pointer-events:none}
.loader-logo{font-family:var(--font-display);font-size:28px;font-weight:800;color:#fff}
.loader-logo span{color:var(--accent)}
.loader-bar{width:160px;height:2px;background:var(--surface2);border-radius:1px;overflow:hidden}
.loader-bar-fill{height:100%;background:var(--accent);border-radius:1px;animation:loadProg 1.5s ease-in-out infinite}
@keyframes loadProg{0%{width:0;margin-left:0}50%{width:100%}100%{width:0;margin-left:100%}}

/* ── LOGIN ── */
#login-page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);position:relative;overflow:hidden;
}
#login-page::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(245,166,35,0.08) 0%,transparent 70%),
             radial-gradient(ellipse 50% 40% at 80% 80%,rgba(79,142,247,0.06) 0%,transparent 60%);
  pointer-events:none;
}
.login-grid{
  display:grid;grid-template-columns:1fr 1fr;max-width:900px;width:100%;
  background:var(--bg2);border:1px solid var(--border2);border-radius:16px;
  overflow:hidden;box-shadow:var(--shadow),var(--glow);margin:20px;
}
.login-hero{
  background:linear-gradient(135deg,#1a1e2b 0%,#0d1117 100%);
  padding:60px 48px;display:flex;flex-direction:column;justify-content:center;
  border-right:1px solid var(--border);position:relative;overflow:hidden;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.2);
  color:var(--accent);font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;
  padding:5px 12px;border-radius:20px;margin-bottom:28px;width:fit-content;
}
.login-hero h1{font-size:36px;font-weight:800;line-height:1.1;margin-bottom:16px;color:#fff}
.login-hero h1 span{color:var(--accent)}
.login-hero p{color:var(--text2);font-size:14px;line-height:1.7;margin-bottom:32px}
.hero-features{list-style:none;display:flex;flex-direction:column;gap:10px}
.hero-features li{display:flex;align-items:center;gap:10px;color:var(--text2);font-size:13px}
.hero-features li::before{content:'✓';color:var(--green);font-weight:700;font-size:12px}
.login-form-wrap{padding:48px 40px;display:flex;flex-direction:column;justify-content:center}
.login-form-wrap h2{font-size:22px;font-weight:700;margin-bottom:6px}
.login-form-wrap p{color:var(--text2);font-size:13px;margin-bottom:24px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:12px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--text2);margin-bottom:7px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  color:var(--text);padding:11px 14px;border-radius:var(--r2);font-size:14px;
  transition:border-color 0.2s;outline:none;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,166,35,0.08)}
.form-group select option{background:var(--surface)}
.form-group textarea{resize:vertical;min-height:80px}
.btn{padding:11px 20px;border-radius:var(--r2);font-size:14px;font-weight:500;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
.btn-primary{background:var(--accent);color:#000;font-weight:600}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--surface)}
.btn-danger{background:rgba(224,84,84,0.1);color:var(--red);border:1px solid rgba(224,84,84,0.2)}
.btn-danger:hover{background:rgba(224,84,84,0.2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface);color:var(--text)}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-green{background:rgba(46,204,138,0.1);color:var(--green);border:1px solid rgba(46,204,138,0.2)}
.btn-green:hover{background:rgba(46,204,138,0.18)}
.btn-blue{background:rgba(79,142,247,0.1);color:var(--blue);border:1px solid rgba(79,142,247,0.2)}
.btn-blue:hover{background:rgba(79,142,247,0.18)}
.alert{padding:10px 14px;border-radius:var(--r2);font-size:13px;margin-bottom:14px;display:none}
.alert.show{display:flex;align-items:center;gap:8px}
.alert-error{background:rgba(224,84,84,0.08);border:1px solid rgba(224,84,84,0.2);color:var(--red)}
.alert-success{background:rgba(46,204,138,0.08);border:1px solid rgba(46,204,138,0.2);color:var(--green)}
.spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SHELL ── */
#shell{display:none;min-height:100vh;flex-direction:row}
#shell.active{display:flex}
.sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow:hidden}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.sidebar-logo span{font-family:var(--font-display);font-size:18px;font-weight:800;color:#fff}
.sidebar-logo span em{color:var(--accent);font-style:normal}
.sidebar-role{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.15);padding:2px 8px;border-radius:10px;margin-top:4px;display:inline-block}
.sidebar-role.student{color:var(--blue);background:rgba(79,142,247,0.08);border-color:rgba(79,142,247,0.15)}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.nav-section{padding:6px 16px 4px;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;margin:1px 8px;border-radius:var(--r2);color:var(--text2);font-size:13px;cursor:pointer;transition:all 0.15s}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:rgba(245,166,35,0.1);color:var(--accent)}
.nav-icon{font-size:15px;width:18px;text-align:center;opacity:0.6}
.nav-item.active .nav-icon{opacity:1}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r2);background:var(--surface);cursor:default}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;flex-shrink:0}
.avatar.blue{background:var(--blue);color:#fff}
.user-info-text{flex:1;overflow:hidden}
.user-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-email{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logout-btn{background:none;border:none;color:var(--text3);font-size:16px;padding:4px;cursor:pointer;flex-shrink:0}
.logout-btn:hover{color:var(--red)}
.main-content{flex:1;overflow-y:auto;height:100vh;background:var(--bg)}
.content-view{display:none;padding:32px 36px;max-width:1200px}
.content-view.active{display:block}
.page-header{margin-bottom:32px}
.page-header h2{font-size:26px;font-weight:800;color:#fff;margin-bottom:6px}
.page-header p{color:var(--text2);font-size:14px}
.page-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;gap:16px;flex-wrap:wrap}
.page-header-row h2{font-size:24px;font-weight:800;color:#fff;margin:0}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.amber::before{background:linear-gradient(90deg,var(--accent),transparent)}
.stat-card.blue::before{background:linear-gradient(90deg,var(--blue),transparent)}
.stat-card.green::before{background:linear-gradient(90deg,var(--green),transparent)}
.stat-card.purple::before{background:linear-gradient(90deg,var(--purple),transparent)}
.stat-value{font-family:var(--font-display);font-size:30px;font-weight:800;color:#fff;line-height:1}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.stat-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:24px;opacity:0.15}

/* ── TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;min-width:500px}
.data-table th{text-align:left;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);padding:10px 14px;border-bottom:1px solid var(--border)}
.data-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(255,255,255,0.02)}
.data-table td:first-child{color:var(--text)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:500}
.badge-draft{background:rgba(139,144,168,0.1);color:var(--text2);border:1px solid var(--border)}
.badge-published{background:rgba(79,142,247,0.1);color:var(--blue);border:1px solid rgba(79,142,247,0.2)}
.badge-released{background:rgba(46,204,138,0.1);color:var(--green);border:1px solid rgba(46,204,138,0.2)}
.badge-not-started{background:rgba(139,144,168,0.08);color:var(--text3);border:1px solid var(--border)}
.badge-in-progress{background:rgba(245,166,35,0.1);color:var(--accent);border:1px solid rgba(245,166,35,0.2)}
.badge-completed{background:rgba(46,204,138,0.1);color:var(--green);border:1px solid rgba(46,204,138,0.2)}
.badge-intro{background:rgba(46,204,138,0.08);color:var(--green);border:1px solid rgba(46,204,138,0.15);font-size:10px}
.badge-easy{background:rgba(79,142,247,0.08);color:var(--blue);border:1px solid rgba(79,142,247,0.15);font-size:10px}
.badge-medium{background:rgba(245,166,35,0.08);color:var(--accent);border:1px solid rgba(245,166,35,0.15);font-size:10px}
.badge-hard{background:rgba(224,84,84,0.08);color:var(--red);border:1px solid rgba(224,84,84,0.15);font-size:10px}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:520px;box-shadow:var(--shadow);max-height:90vh;overflow-y:auto}
.modal-header{padding:22px 24px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:700;color:#fff}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:var(--surface);color:var(--text)}
.modal-body{padding:24px}
.modal-footer{padding:18px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.divider{height:1px;background:var(--border);margin:20px 0}

/* ── LESSON CARDS ── */
.lessons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.lesson-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all 0.2s}
.lesson-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.lesson-card-header{padding:18px 18px 14px;background:linear-gradient(135deg,var(--bg3) 0%,var(--surface) 100%);border-bottom:1px solid var(--border)}
.lesson-card-badges{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.lesson-card-title{font-family:var(--font-display);font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
.lesson-card-desc{font-size:12px;color:var(--text2);line-height:1.5}
.lesson-card-body{padding:14px 18px}
.lesson-meta{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--text3);margin-bottom:12px}
.lesson-actions{display:flex;gap:6px;flex-wrap:wrap}

/* ── LEVELS ── */
.levels-list{display:flex;flex-direction:column;gap:10px}
.level-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px}
.level-order{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text2);flex-shrink:0}
.level-info{flex:1}
.level-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.level-meta{font-size:11px;color:var(--text3)}

/* ── STUDENT HOME ── */
.student-greeting{margin-bottom:36px}
.student-greeting h2{font-size:32px;font-weight:800;color:#fff;margin-bottom:6px}
.student-greeting h2 span{color:var(--accent)}
.student-greeting p{color:var(--text2);font-size:15px}
.lesson-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.lesson-tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.25s}
.lesson-tile:hover{border-color:rgba(245,166,35,0.3);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.35),0 0 30px rgba(245,166,35,0.06)}
.lesson-tile.completed{border-color:rgba(46,204,138,0.2)}
.lesson-tile-accent{height:4px;background:linear-gradient(90deg,var(--accent),var(--blue))}
.lesson-tile.completed .lesson-tile-accent{background:linear-gradient(90deg,var(--green),var(--blue))}
.lesson-tile-body{padding:20px}
.tile-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.tile-icon{font-size:28px;line-height:1}
.tile-title{font-family:var(--font-display);font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3}
.tile-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.tile-progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:8px}
.tile-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));border-radius:2px;transition:width 0.4s}
.tile-progress-fill.complete{background:linear-gradient(90deg,var(--green),var(--blue))}
.tile-stats{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}

/* ── LEVEL PLAYER ── */
.level-player{max-width:760px;margin:0 auto}
.level-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.level-back{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:var(--r2);font-size:13px;cursor:pointer}
.level-back:hover{background:var(--surface2);color:var(--text)}
.level-header-info h3{font-size:18px;font-weight:700;color:#fff;margin-bottom:2px}
.level-header-info p{font-size:12px;color:var(--text2)}
.step-progress{display:flex;align-items:center;gap:6px;margin-bottom:20px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--surface2);transition:all 0.2s}
.step-dot.done{background:var(--green)}
.step-dot.current{background:var(--accent);transform:scale(1.3)}
.step-counter{font-size:12px;color:var(--text3);margin-left:6px}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;margin-bottom:16px;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.step-type-badge{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.step-type-badge::before{content:'';width:16px;height:1px;background:var(--border2)}
.step-emoji{font-size:40px;margin-bottom:16px;display:block}
.step-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:12px}
.step-body{font-size:14px;color:var(--text2);line-height:1.8}
.step-options{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.step-option{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:12px 16px;cursor:pointer;transition:all 0.2s;font-size:14px;color:var(--text);text-align:left}
.step-option:hover{border-color:rgba(245,166,35,0.3);background:rgba(245,166,35,0.04)}
.step-option.correct{border-color:var(--green);background:rgba(46,204,138,0.08);color:var(--green)}
.step-option.incorrect{border-color:var(--red);background:rgba(224,84,84,0.08);color:var(--red)}
.step-option.disabled{pointer-events:none;opacity:0.7}
.step-feedback{margin-top:14px;padding:12px 16px;border-radius:var(--r2);font-size:13px}
.step-feedback.correct{background:rgba(46,204,138,0.08);border:1px solid rgba(46,204,138,0.2);color:var(--green)}
.step-feedback.incorrect{background:rgba(224,84,84,0.08);border:1px solid rgba(224,84,84,0.2);color:var(--red)}
.step-nav{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
.complete-banner{background:linear-gradient(135deg,rgba(46,204,138,0.1),rgba(79,142,247,0.08));border:1px solid rgba(46,204,138,0.2);border-radius:var(--r);padding:32px;text-align:center;margin-bottom:20px}
.complete-banner h3{font-size:24px;font-weight:800;color:var(--green);margin-bottom:8px}
.complete-banner p{color:var(--text2);font-size:14px}

/* ── PROFILE ── */
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px;max-width:520px}
.profile-card h3{font-size:15px;font-weight:700;color:#fff;margin-bottom:18px}
.profile-avatar-row{display:flex;align-items:center;gap:14px;margin-bottom:22px;padding:14px;background:var(--bg3);border-radius:var(--r2)}

function hideScreen(id) { const el = document.getElementById(id); if(el) el.style.display='none'; }
function showScreen(id, flex=false) { const el = document.getElementById(id); if(el) el.style.display=flex?'flex':'block'; }

// ── Helpers ────────────────────────────────────────────────────────────
function uid(prefix='id') { return prefix+'_'+Date.now()+'_'+Math.random().toString(36).substr(2,5); }
function ts(d){ try{ return new Date(d?.seconds?d.seconds*1000:d).toLocaleDateString(); }catch{ return '—'; } }

window.toast = (msg, type='success') => {
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.style.cssText='background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);min-width:200px;animation:slideUp 0.25s ease;font-family:var(--font-body)';
  if(type==='success') t.style.borderColor='rgba(46,204,138,0.3)';
  if(type==='error')   t.style.borderColor='rgba(224,84,84,0.3)';
  t.innerHTML=`<span>${{success:'✓',error:'✗',info:'ℹ'}[type]||'•'}</span>${msg}`;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.2s';setTimeout(()=>t.remove(),200);},3000);
};
window.openModal  = id => { const el=document.getElementById(id); if(el){el.style.display='flex';} };
window.closeModal = id => { const el=document.getElementById(id); if(el){el.style.display='none';} };

let pendingConfirm = null;
window.showConfirm = (icon, title, msg, cb, okLabel='Confirm', okClass='btn-danger') => {
  pendingConfirm=cb;
  document.getElementById('confirm-icon').textContent=icon;
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  const btn=document.getElementById('confirm-ok-btn');
  btn.textContent=okLabel; btn.className='btn '+okClass;
  document.getElementById('confirm-overlay').style.display='flex';
};
window.closeConfirm = ()=>{ document.getElementById('confirm-overlay').style.display='none'; pendingConfirm=null; };
window.confirmAction = ()=>{ if(pendingConfirm)pendingConfirm(); closeConfirm(); };

function showView(id) {
  document.querySelectorAll('.content-view').forEach(v=>v.style.display='none');
  document.querySelectorAll('[id^="nav-"]').forEach(n=>n.classList.remove('active'));
  const view=document.getElementById(id); if(view) view.style.display='block';
  const nav=document.getElementById('nav-'+id); if(nav) nav.classList.add('active');
}
function showAuthError(msg){ const a=document.getElementById('auth-alert'),m=document.getElementById('auth-alert-msg'); if(a&&m){m.textContent=msg;a.style.display='flex';} }

// ── Firebase init & app boot ───────────────────────────────────────────
async function bootApp() {
  const loading = document.getElementById('loading-screen');
  const lmsg    = document.getElementById('loading-msg');
  try {
    if(lmsg) lmsg.textContent='Connecting...';
    app  = initializeApp(FIREBASE_CONFIG);
    auth = getAuth(app);
    db   = getFirestore(app);

    // Wait for Firebase Auth to determine sign-in state
    onAuthStateChanged(auth, async (user) => {
      if (loading) { loading.style.opacity='0'; setTimeout(()=>loading.style.display='none',300); }
      if (user) {
        // Signed in — load user profile
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists()) {
          // Auth user exists but no Firestore profile — create one (shouldn't happen normally)
          await signOut(auth);
          showScreen('login-page','flex');
          return;
        }
        currentUser     = user;
        currentUserData = { id: user.uid, email: user.email, ...snap.data() };
        await initShell();
      } else {
        // Not signed in — check if any admin exists
        const adminSnap = await getDocs(query(collection(db,'users'),where('role','==','admin')));
        if (adminSnap.empty) {
          showScreen('first-run-screen');
        } else {
          showScreen('login-page','flex');
        }
      }
    });
  } catch(err) {
    if(loading) loading.style.display='none';
    document.body.innerHTML='<div style="font-family:sans-serif;padding:40px;color:#fff;background:#0d0f14;min-height:100vh"><h2 style="color:#f5a623">AutoEdu — Connection Error</h2><p style="color:#8b90a8;margin-top:12px">'+err.message+'</p><p style="color:#555a6e;font-size:13px;margin-top:8px">Check your internet connection and try refreshing.</p></div>';
  }
}


window.createFirstAdmin = async () => {
  const name  = document.getElementById('fr-name').value.trim();
  const email = document.getElementById('fr-email').value.trim();
  const pass  = document.getElementById('fr-pass').value.trim();
  const errEl = document.getElementById('first-run-alert');
  const btn   = document.getElementById('fr-btn');

  if (!name||!email||!pass){ errEl.style.display='flex'; document.getElementById('first-run-alert-msg').textContent='All fields required.'; return; }
  if (pass.length<6){ errEl.style.display='flex'; document.getElementById('first-run-alert-msg').textContent='Password must be at least 6 characters.'; return; }

  btn.disabled=true; btn.textContent='Creating account...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db,'users',cred.user.uid), { name, email:email.toLowerCase(), role:'admin', created_at:new Date().toISOString() });
    // Seed lessons
    await seedLessonsIfEmpty();
    // onAuthStateChanged will fire and load the shell
  } catch(e) {
    errEl.style.display='flex';
    document.getElementById('first-run-alert-msg').textContent=e.message;
    btn.disabled=false; btn.textContent='Create Admin Account →';
  }
};

// ── Authentication ─────────────────────────────────────────────────────
window.submitAuth = () => {
  const email    = (document.getElementById('auth-email')?.value||'').trim();
  const password = (document.getElementById('auth-password')?.value||'').trim();
  if (!email||!password){ showAuthError('Please enter your email and password.'); return; }

  const btn = document.getElementById('auth-submit-btn');
  if(btn){btn.disabled=true; btn.innerHTML='<span style="width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block"></span> Signing in...';}

  signInWithEmailAndPassword(auth, email, password)
    .then(()=>{ document.getElementById('auth-alert').style.display='none'; })
    .catch(e => {
      let msg = 'Incorrect email or password.';
      if(e.code==='auth/too-many-requests') msg='Too many attempts. Please wait a moment and try again.';
      showAuthError(msg);
      if(btn){btn.disabled=false; btn.textContent='Sign In →';}
    });
};

window.doLogout = async () => {
  await signOut(auth);
  currentUser=null; currentUserData=null;
  document.getElementById('shell').style.display='none';
  showScreen('login-page','flex');
};

document.addEventListener('keydown', e => {
  if(e.key==='Enter' && document.getElementById('login-page')?.style?.display!=='none') submitAuth();
  if(e.key==='Escape'){
    document.querySelectorAll('.modal-overlay,[id^="modal-"]').forEach(m=>{ if(m.style.display!=='none') m.style.display='none'; });
    closeConfirm();
  }
});

// ── Firestore data functions ───────────────────────────────────────────
// Users
async function getUsers(){ const s=await getDocs(query(collection(db,'users'),orderBy('created_at','asc'))); return s.docs.map(d=>({id:d.id,...d.data()})); }
async function getUserById(id){ const s=await getDoc(doc(db,'users',id)); return s.exists()?{id:s.id,...s.data()}:null; }
async function updateUser(id,data){ await updateDoc(doc(db,'users',id),{...data,updated_at:new Date().toISOString()}); }
async function deleteUser(id){
  await deleteDoc(doc(db,'users',id));
  // Delete their progress
  const ps=await getDocs(query(collection(db,'progress'),where('user_id','==',id)));
  await Promise.all(ps.docs.map(d=>deleteDoc(d.ref)));
}

// Lessons
async function getLessons(){ const s=await getDocs(collection(db,'lessons')); return s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||'')); }
async function saveLesson(id,data){ await setDoc(doc(db,'lessons',id),{...data,updated_at:new Date().toISOString()},{merge:true}); }
async function deleteLesson(id){
  await deleteDoc(doc(db,'lessons',id));
  const lvls=await getDocs(query(collection(db,'levels'),where('lesson_id','==',id)));
  await Promise.all(lvls.docs.map(d=>deleteDoc(d.ref)));
  const ps=await getDocs(query(collection(db,'progress'),where('lesson_id','==',id)));
  await Promise.all(ps.docs.map(d=>deleteDoc(d.ref)));
}

// Levels
async function getLevels(lessonId){ const s=await getDocs(query(collection(db,'levels'),where('lesson_id','==',lessonId))); return s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.order_num-b.order_num); }
async function getAllLevels(){ const s=await getDocs(collection(db,'levels')); return s.docs.map(d=>({id:d.id,...d.data()})); }
async function saveLevel(id,data){ await setDoc(doc(db,'levels',id),data,{merge:true}); }
async function deleteLevel(id){
  await deleteDoc(doc(db,'levels',id));
  const ps=await getDocs(query(collection(db,'progress'),where('level_id','==',id)));
  await Promise.all(ps.docs.map(d=>deleteDoc(d.ref)));
}

// Progress
async function getProgressForUser(userId){ const s=await getDocs(query(collection(db,'progress'),where('user_id','==',userId))); return s.docs.map(d=>({id:d.id,...d.data()})); }
async function getAllProgress(){ const s=await getDocs(collection(db,'progress')); return s.docs.map(d=>({id:d.id,...d.data()})); }
async function upsertProgress(data){
  const id=data.user_id+'_'+data.level_id;
  await setDoc(doc(db,'progress',id),{...data,updated_at:new Date().toISOString()},{merge:true});
}
async function resetUserProgress(userId){
  const ps=await getDocs(query(collection(db,'progress'),where('user_id','==',userId)));
  await Promise.all(ps.docs.map(d=>deleteDoc(d.ref)));
}

// Seed default lessons if Firestore is empty
async function seedLessonsIfEmpty(){
  const existing = await getLessons();
  if(existing.length > 0) return;
  toast('Setting up lessons...','info');
  const batch=[];
  DEFAULT_LESSONS.forEach((l,idx)=>{
    const {levels:lvls,...lessonData}=l;
    lessonData.created_at=new Date().toISOString();
    lessonData.updated_at=new Date().toISOString();
    if(idx<5){lessonData.is_released=true;lessonData.release_order=idx+1;}
    else{lessonData.is_released=false;lessonData.release_order=null;}
    lessonData.status='published';
    batch.push(setDoc(doc(db,'lessons',l.id),lessonData));
    lvls.forEach(lv=>{
      const lvData={...lv,lesson_id:l.id,created_at:new Date().toISOString()};
      batch.push(setDoc(doc(db,'levels',lv.id),lvData));
    });
  });
  await Promise.all(batch);

function renderNav(){
  const nav=document.getElementById('sidebar-nav');
  const isAdmin=currentUserData.role==='admin';
  const items=isAdmin?[
    {s:'Overview'},{id:'view-dashboard',icon:'⊞',label:'Dashboard'},

  ]:[
    {s:'Learning'},{id:'view-student-home',icon:'🏠',label:'My Lessons'},{id:'view-my-progress',icon:'📈',label:'My Progress'},
  ];
  nav.innerHTML=items.map(i=>i.s
    ?`<div style="padding:6px 16px 4px;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-top:8px">${i.s}</div>`
    :`<div id="nav-${i.id}" onclick="navClick('${i.id}')" style="display:flex;align-items:center;gap:10px;padding:9px 16px;margin:1px 8px;border-radius:var(--r2);color:var(--text2);font-size:13px;cursor:pointer;transition:all 0.15s" onmouseover="if(!this.classList.contains('active')){this.style.background='var(--surface)';this.style.color='var(--text)';}" onmouseout="if(!this.classList.contains('active')){this.style.background='';this.style.color='var(--text2)';}"><span style="font-size:15px;width:18px;text-align:center">${i.icon}</span>${i.label}</div>`
  ).join('');
}

window.navClick = async (viewId) => {
  const handlers={
    'view-dashboard':     renderDashboard,
    'view-lessons':       renderAdminLessons,
    'view-students':      renderStudents,
    'view-progress-admin':renderProgressAdmin,
    'view-release':       renderRelease,
    'view-student-home':  renderStudentHome,
    'view-my-progress':   renderMyProgress,
  };
  if(handlers[viewId]) await handlers[viewId]();
  showView(viewId);
};

function navStyle(el,active){
  if(active){el.style.background='rgba(245,166,35,0.1)';el.style.color='var(--accent)';}
  else{el.style.background='';el.style.color='var(--text2)';}
}
document.querySelectorAll=document.querySelectorAll.bind(document);
const _origShowView=showView;
showView=function(id){
  document.querySelectorAll('.content-view').forEach(v=>v.style.display='none');
  document.querySelectorAll('[id^="nav-"]').forEach(n=>{n.style.background='';n.style.color='var(--text2)';n.classList.remove('active');});
  const view=document.getElementById(id); if(view) view.style.display='block';
  const nav=document.getElementById('nav-'+id); if(nav){nav.style.background='rgba(245,166,35,0.1)';nav.style.color='var(--accent)';nav.classList.add('active');}
};

        <span style="position:absolute;inset:0;background:${l.is_released?'rgba(46,204,138,0.2)':'var(--surface2)'};border-radius:12px;border:1px solid ${l.is_released?'var(--green)':'var(--border2)'};transition:0.3s;cursor:pointer">
          <span style="position:absolute;height:16px;width:16px;left:${l.is_released?'23':'3'}px;top:3px;background:${l.is_released?'var(--green)':'var(--text3)'};border-radius:50%;transition:0.3s"></span>
        </span>
      </label>

window.toggleRelease = async (id,isReleased) => {
  if(isReleased){
    const lessons=await getLessons();
    const maxOrder=Math.max(0,...lessons.filter(l=>l.is_released&&l.release_order).map(l=>l.release_order));
    await saveLesson(id,{is_released:true,release_order:maxOrder+1});
  } else {
    await saveLesson(id,{is_released:false,release_order:null});
  }
  await renderRelease();
};

window.saveStudent = async () => {
  const name  = document.getElementById('student-modal-name')?.value?.trim()||'';
  const email = document.getElementById('student-modal-email')?.value?.trim()||'';
  const pw    = document.getElementById('student-modal-pass')?.value?.trim()||'';
  if(!name||!email){toast('Name and email required','error');return;}
  if(!pw||pw.length<6){toast('Password must be at least 6 characters','error');return;}
  const btn=document.getElementById('save-student-btn');
  btn.disabled=true; btn.textContent='Creating...';
  try {
    // Use Firebase Auth REST API to create student without signing out admin
    const apiKey=app.options.apiKey;
    const res=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${apiKey}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email.toLowerCase(),password:pw,returnSecureToken:false})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message.replace('EMAIL_EXISTS','Email already in use'));
    // Save profile to Firestore
    await setDoc(doc(db,'users',data.localId),{name,email:email.toLowerCase(),role:'student',created_at:new Date().toISOString()});
    // Show confirmation
    document.getElementById('student-modal-body').innerHTML=`
      <div style="text-align:center;padding:16px 0">

  } else {
    const isAssess = type === 'assessment';
    const opts = existing?.options || ['','','',''];
    const correct = existing?.correct ?? 0;
    wrap.innerHTML = `
      <div class="form-group" style="margin-bottom:8px"><label style="font-size:11px">${isAssess?'Question':'Prompt'}</label>

          <label for="correct-${i}-${oi}" style="font-size:11px;color:var(--text3);min-width:12px">${String.fromCharCode(65+oi)}</label>
          <input id="option-${i}-${oi}" type="text" value="${escHtml(o)}" placeholder="Option ${String.fromCharCode(65+oi)}"
            style="background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:4px;font-size:12px;flex:1"/>
        </div>`).join('')}
      ${isAssess
        ? `<div class="form-group" style="margin-top:8px"><label style="font-size:11px">Explanation (shown after answer)</label><textarea id="step-body-${i}">${escHtml(existing?.explanation||'')}</textarea></div>`
        : `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
            <div class="form-group"><label style="font-size:11px">Correct Feedback</label><input id="step-fb-correct-${i}" type="text" value="${escHtml(existing?.feedback?.correct||'')}"/></div>
            <div class="form-group"><label style="font-size:11px">Wrong Feedback</label><input id="step-fb-wrong-${i}" type="text" value="${escHtml(existing?.feedback?.incorrect||'')}"/></div>
           </div>`}`;

window.updateStepType = (i) => renderStepFields(i, document.getElementById(`step-type-${i}`).value, null);
window.removeStep = (i) => { const el = document.getElementById(`step-wrap-${i}`); if (el) el.remove(); };

function collectSteps() {
  const steps = [];
  document.querySelectorAll('[id^="step-wrap-"]').forEach(wrap => {
    const i = wrap.id.split('-')[2];
    const type = document.getElementById(`step-type-${i}`)?.value;
    if (!type) return;
    const step = { id: `s${i}`, type };
    const title = document.getElementById(`step-title-${i}`)?.value;
    const body = document.getElementById(`step-body-${i}`)?.value;
    if (type === 'info') {
      step.title = title || ''; step.body = body || '';
      step.image = document.getElementById(`step-img-${i}`)?.value || '📋';
    } else {
      const opts = [0,1,2,3].map(oi => document.getElementById(`option-${i}-${oi}`)?.value || '').filter(Boolean);
      const correctEl = document.querySelector(`input[name="correct-${i}"]:checked`);
      const correct = correctEl ? parseInt(correctEl.value) : 0;
      if (type === 'interactive') {
        step.prompt = title || ''; step.options = opts; step.correct = correct;
        step.feedback = {
          correct: document.getElementById(`step-fb-correct-${i}`)?.value || 'Correct!',
          incorrect: document.getElementById(`step-fb-wrong-${i}`)?.value || 'Try again.'
        };
      } else {
        step.question = title || ''; step.options = opts; step.correct = correct;
        step.explanation = body || '';
      }
    }
    steps.push(step);
  });
  return steps;
}

window.playLevel = async (levelId) => {
  currentLevelId = levelId;
  const _lvSnap = await getDoc(doc(db,'levels',levelId));
  const level = {id:levelId,..._lvSnap.data()};
  const _lsSnap = await getDoc(doc(db,'lessons',level.lesson_id));
  const lesson = {id:level.lesson_id,..._lsSnap.data()};
  playerSteps = level.content?.steps || [];
  playerStepIndex = 0;
  playerScore = 0;
  playerAnswered = false;

  // Mark as in progress
  await upsertProgress({ user_id: currentUserData.id, lesson_id: level.lesson_id, level_id: levelId, status: 'in_progress' });

  await renderPlayerStep(level, lesson);
};

async function renderPlayerStep(level, lesson) {
  const wrap = document.getElementById('level-player-wrap');
  const step = playerSteps[playerStepIndex];
  const totalSteps = playerSteps.length;

  if (!step) {
    // End of level
    const totalQ = playerSteps.filter(s => s.type === 'assessment').length;
    const score = totalQ > 0 ? Math.round((playerScore / totalQ) * 100) : 100;
    const passed = score >= level.pass_score;

    await upsertProgress({
      user_id: currentUserData.id,
      lesson_id: level.lesson_id,
      level_id: level.id,
      status: 'completed',
      score,
      completed_at: new Date().toISOString()
    });

    wrap.innerHTML = `
      <div class="level-header">
        <button class="level-back" onclick="openLessonPlayer('${level.lesson_id}')">← Back to Levels</button>
        <div class="level-header-info"><h3>${lesson.icon||'📘'} ${lesson.title}</h3><p>${level.title}</p></div>
      </div>
      <div class="complete-banner">
        <div style="font-size:48px;margin-bottom:12px">${passed?'🎉':'📖'}</div>
        <h3>${passed?'Level Complete!':'Good Effort!'}</h3>
        <p style="margin-top:8px;font-size:16px;color:var(--text)">You scored <strong style="color:var(--accent)">${score}%</strong>${totalQ>0?' on the assessment questions':' — all steps reviewed'}.</p>
        <p style="margin-top:6px;color:var(--text2);font-size:13px">${passed?'Great work! The level has been marked as complete.':'Keep practicing — you can retry this level anytime.'}</p>
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-ghost" onclick="openLessonPlayer('${level.lesson_id}')">← Back to Levels</button>
        <button class="btn btn-primary" onclick="navClick('view-student-home')">My Lessons</button>
      </div>`;
    return;
  }

  const dotsHtml = playerSteps.map((_, i) => `<div class="step-dot ${i < playerStepIndex ? 'done' : i === playerStepIndex ? 'current' : ''}"></div>`).join('');

  let stepHtml = '';
  if (step.type === 'circuit') {
    // Electude-style circuit fault-finding simulator
    stepHtml = `
      <div class="step-type-badge" style="background:rgba(46,204,138,0.1);color:var(--green);border:1px solid rgba(46,204,138,0.2)">🔌 Circuit Lab</div>

      <div class="step-type-badge">🎯 Interactive</div>
      <div class="step-title">${step.prompt||''}</div>
      <div class="step-options">${opts}</div>
      <div id="step-feedback-box"></div>`;
  } else if (step.type === 'assessment') {
    const opts = (step.options||[]).map((o,i) => `<button class="step-option" id="opt-${i}" onclick="answerAssessment(${i},${step.correct},'${level.id}','${lesson.id}')">${o}</button>`).join('');
    stepHtml = `
      <div class="step-type-badge">📝 Assessment Question</div>
      <div class="step-title">${step.question||''}</div>
      <div class="step-options">${opts}</div>
      <div id="step-feedback-box"></div>`;
  }

  wrap.innerHTML = `
    <div class="level-header">
      <button class="level-back" onclick="openLessonPlayer('${level.lesson_id}')">← Back to Levels</button>

window.nextStep = async (levelId, lessonId) => {
  const _lv3 = await getDoc(doc(db,'levels',levelId)); const level = {id:levelId,..._lv3.data()};
  const _ls=await getDoc(doc(db,'lessons',lessonId));const lesson={id:lessonId,..._ls.data()};
  playerStepIndex++;
  playerAnswered = false;
  await renderPlayerStep(level, lesson);
};

window.answerInteractive = async (chosen, correct, levelId, lessonId) => {
  if (playerAnswered) return;
  playerAnswered = true;
  const step = playerSteps[playerStepIndex];
  const isCorrect = chosen === correct;
  // Style options
  document.querySelectorAll('.step-option').forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === correct) btn.classList.add('correct');
    else if (i === chosen && !isCorrect) btn.classList.add('incorrect');
  });
  const fb = document.getElementById('step-feedback-box');
  if (fb) {
    fb.innerHTML = `<div class="step-feedback ${isCorrect?'correct':'incorrect'}">${isCorrect ? (step.feedback?.correct||'Correct!') : (step.feedback?.incorrect||'Incorrect.')}</div>
      <div class="step-nav" style="margin-top:12px"><button class="btn btn-primary" onclick="nextStep('${levelId}','${lessonId}')">Continue →</button></div>`;
  }
};

async function renderMyProgress() {
  const wrap = document.getElementById('my-progress-content');
  const lessons = (await getLessons()).filter(l => l.is_released).sort((a,b) => (a.release_order||99)-(b.release_order||99));
  const allLevels = await getAllLevels();
  const progress = await getProgressForUser(currentUserData.id);

  if (!lessons.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🚀</div><p>No lessons released yet. Check back soon!</p></div>`;
    return;
  }

  wrap.innerHTML = lessons.map(l => {
    const lvls = allLevels.filter(lv => lv.lesson_id === l.id).sort((a,b)=>a.order_num-b.order_num);
    const done = lvls.filter(lv => progress.find(p => p.level_id===lv.id && p.status==='completed')).length;
    const pct = lvls.length ? Math.round((done/lvls.length)*100) : 0;
    const isComplete = done === lvls.length && lvls.length > 0;

    const levelRows = lvls.map(lv => {
      const p = progress.find(pr => pr.level_id === lv.id);
      const completed = p?.status === 'completed';
      return `
      <div class="progress-level-row">
        <div style="font-size:12px;color:${completed?'var(--green)':'var(--text3)'}">
          ${completed?'✓':'○'} Level ${lv.order_num}: ${lv.title}
        </div>
        <div class="progress-bar-outer">
          <div class="progress-bar-inner${completed?' complete':''}" style="width:${completed?100:0}%"></div>
        </div>
        <div style="font-size:11px;color:var(--text3);min-width:50px;text-align:right">
          ${completed?(p.score!=null?p.score+'%':'Done'):'—'}
        </div>
      </div>`;
    }).join('');

    return `
    <div class="my-progress-lesson">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <h3>${l.icon||'📘'} ${l.title}</h3>
        <span class="badge badge-${isComplete?'completed':done>0?'in-progress':'not-started'}">${isComplete?'✓ Complete':done>0?'In Progress':'Not Started'}</span>
      </div>
      <div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:6px">
          <span>${done}/${lvls.length} levels complete</span><span>${pct}%</span>

        <div class="tile-progress-bar"><div class="tile-progress-fill${isComplete?' complete':''}" style="width:${pct}%"></div></div>
      </div>
      ${levelRows}
      <div style="margin-top:14px">
        <button class="btn btn-primary btn-sm" onclick="openLessonPlayer('${l.id}')">
          ${isComplete?'Review Lesson':'Continue Lesson →'}

      </div>
    </div>`;
  }).join('');
}

window.probeTP = function(card, voltage, tpId, label, circuitId) {
  const v = parseFloat(voltage);
  const color = v >= 11 ? '#4ADE80' : v <= 0.5 ? '#EF4444' : '#F59E0B';
  card.style.borderColor = color;
  card.style.background = `rgba(${v>=11?'46,204,138':v<=0.5?'224,84,84':'245,166,35'},0.06)`;
  const rd = document.getElementById(`tp-reading-${tpId}-${circuitId}`);
  if(rd){
    rd.style.display='block';
    rd.style.color=color;
    rd.textContent = v.toFixed(1) + ' V';
  }
};

window.selectCircuitFault = function(btn, circuitId, idx, correct, analysis) {
  const opts = document.querySelectorAll(`#fault-opts-${circuitId} button`);
  opts.forEach(b=>b.classList.add('done'));
  opts.forEach(b=>{b.style.cursor='default';b.onmouseover=null;b.onmouseout=null;});
  const isCorrect = idx === correct;
  btn.style.borderColor = isCorrect ? 'var(--green)' : 'var(--red)';
  btn.style.background  = isCorrect ? 'rgba(46,204,138,0.1)' : 'rgba(224,84,84,0.1)';
  btn.style.color       = isCorrect ? 'var(--green)' : 'var(--red)';
  if(!isCorrect){
    const correctBtn = opts[correct];
    if(correctBtn){
      correctBtn.style.borderColor='var(--green)';
      correctBtn.style.background='rgba(46,204,138,0.06)';
      correctBtn.style.color='var(--green)';
    }
  }
  const fb = document.getElementById(`circuit-feedback-${circuitId}`);
  if(fb){
    fb.style.display='block';
    fb.innerHTML=`
      <div class="step-feedback ${isCorrect?'correct':'incorrect'}" style="margin:0 0 12px">${isCorrect?'\u2713 Correct diagnosis! Well done.':'\u2717 Not quite. See the correct answer highlighted above.'}</div>
      <div style="padding:12px 14px;background:var(--bg3);border-radius:var(--r2);font-size:13px;color:var(--text2);line-height:1.7"><strong style="color:var(--text)">Analysis:</strong> ${analysis}</div>
      <div style="margin-top:12px"><button class="btn btn-primary btn-sm" onclick="document.dispatchEvent(new CustomEvent('circuitDone',{detail:{correct:${isCorrect}}}))">Continue \u2192</button></div>`;
  }
};
